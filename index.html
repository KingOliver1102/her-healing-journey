<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Her Healing Journey — Blog & Community</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== CSS VARIABLES / THEME (same as before) ===== */
    :root {
      --primary: #b87c5e;
      --primary-dark: #9a664b;
      --primary-light: #dbb6a2;
      --secondary: #e8d5c4;
      --accent: #c9a87c;
      --gold: #c9a87c;
      --cream: #fcf6f0;
      --warm-white: #fdfaf7;
      --dark: #3d2c24;
      --text: #4a372e;
      --text-light: #7a6559;
      --shadow: 0 8px 30px rgba(60, 40, 30, 0.10);
      --shadow-hover: 0 12px 40px rgba(60, 40, 30, 0.18);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s ease;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-sans: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }
    /* ===== RESET & BASE (same as before) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* --- STICKY FOOTER FIX --- */
    html, body {
      height: 100%;
    }
    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #app {
      flex: 1 0 auto;
    }
    footer {
      flex-shrink: 0;
    }
    /* --- end sticky footer --- */
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ul { list-style: none; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--secondary); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    /* Utility */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .btn { display: inline-block; padding: 10px 28px; border: none; border-radius: 50px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: var(--transition); background: var(--primary); color: #fff; font-family: var(--font-sans); letter-spacing: 0.3px; }
    .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(184, 124, 94, 0.35); }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary); color: #fff; }
    .btn-sm { padding: 6px 18px; font-size: 0.85rem; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #a93226; }
    .btn-secondary { background: var(--secondary); color: var(--dark); }
    .btn-secondary:hover { background: #dcc4b2; }
    .section-title { font-family: var(--font-serif); font-size: 2.2rem; color: var(--dark); margin-bottom: 12px; letter-spacing: -0.5px; }
    .section-subtitle { color: var(--text-light); font-size: 1.05rem; margin-bottom: 32px; }
    .text-center { text-align: center; }
    .hidden { display: none !important; }
    /* ===== HEADER / NAV ===== */
    header { background: var(--warm-white); box-shadow: 0 2px 20px rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 1000; padding: 14px 0; border-bottom: 1px solid rgba(184,124,94,0.12); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .logo { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    .logo i { color: var(--primary); font-size: 1.8rem; }
    .logo span { color: var(--primary); }
    .nav-links { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-links a, .nav-links .nav-link { padding: 6px 16px; border-radius: 50px; font-size: 0.92rem; font-weight: 500; color: var(--text); transition: var(--transition); cursor: pointer; background: transparent; border: none; font-family: var(--font-sans); }
    .nav-links a:hover, .nav-links .nav-link:hover { background: var(--secondary); color: var(--dark); }
    .nav-links a.active, .nav-links .nav-link.active { background: var(--primary); color: #fff; }
    .nav-auth { display: flex; align-items: center; gap: 6px; }
    .nav-auth .btn { padding: 6px 18px; font-size: 0.85rem; }
    /* HERO */
    .hero { padding: 60px 0 50px; background: linear-gradient(145deg, var(--warm-white) 0%, var(--secondary) 100%); border-bottom: 1px solid rgba(184,124,94,0.10); }
    .hero-content { max-width: 700px; }
    .hero h1 { font-family: var(--font-serif); font-size: 3.2rem; color: var(--dark); line-height: 1.2; margin-bottom: 16px; }
    .hero h1 i { color: var(--primary); }
    .hero p { font-size: 1.2rem; color: var(--text-light); margin-bottom: 28px; max-width: 540px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 12px; }
    .hero-badges .badge { background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); padding: 6px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 500; color: var(--primary-dark); border: 1px solid rgba(184,124,94,0.20); }
    /* CATEGORY TABS */
    .category-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin: 28px 0 20px; padding-bottom: 8px; border-bottom: 2px solid rgba(184,124,94,0.12); }
    .category-tabs .cat-btn { padding: 6px 22px; border-radius: 50px; border: none; background: transparent; color: var(--text-light); font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: var(--transition); font-family: var(--font-sans); }
    .category-tabs .cat-btn:hover { background: var(--secondary); color: var(--dark); }
    .category-tabs .cat-btn.active { background: var(--primary); color: #fff; }
    /* BLOG GRID */
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin: 30px 0 50px; }
    .post-card { background: var(--warm-white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: var(--transition); border: 1px solid rgba(184,124,94,0.06); }
    .post-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
    .post-card .card-body { padding: 22px 24px 26px; }
    .post-card .card-category { display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--primary); background: rgba(184,124,94,0.10); padding: 2px 14px; border-radius: 50px; margin-bottom: 10px; }
    .post-card h3 { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 8px; color: var(--dark); line-height: 1.3; }
    .post-card .card-meta { font-size: 0.8rem; color: var(--text-light); margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
    .post-card .card-meta i { margin-right: 4px; }
    .post-card .card-excerpt { color: var(--text-light); font-size: 0.95rem; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .post-card .card-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    /* POST DETAIL */
    .post-detail { background: var(--warm-white); border-radius: var(--radius); padding: 40px 44px; box-shadow: var(--shadow); margin: 30px 0; border: 1px solid rgba(184,124,94,0.06); }
    .post-detail .detail-category { display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--primary); background: rgba(184,124,94,0.10); padding: 2px 16px; border-radius: 50px; margin-bottom: 12px; }
    .post-detail h1 { font-family: var(--font-serif); font-size: 2.4rem; color: var(--dark); margin-bottom: 12px; line-height: 1.2; }
    .post-detail .detail-meta { color: var(--text-light); font-size: 0.9rem; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; }
    .post-detail .detail-meta i { margin-right: 6px; }
    .post-detail .detail-body { font-size: 1.05rem; line-height: 1.9; color: var(--text); white-space: pre-wrap; }
    .post-detail .detail-body p { margin-bottom: 16px; }
    /* COMMENTS */
    .comments-section { margin: 30px 0 50px; background: var(--warm-white); border-radius: var(--radius); padding: 30px 36px; box-shadow: var(--shadow); border: 1px solid rgba(184,124,94,0.06); }
    .comments-section h3 { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 20px; color: var(--dark); }
    .comment-item { padding: 16px 0; border-bottom: 1px solid rgba(184,124,94,0.08); }
    .comment-item:last-child { border-bottom: none; }
    .comment-item .comment-author { font-weight: 600; color: var(--dark); }
    .comment-item .comment-date { font-size: 0.8rem; color: var(--text-light); margin-left: 12px; }
    .comment-item .comment-text { margin-top: 4px; color: var(--text); }
    .comment-form textarea { width: 100%; padding: 14px 18px; border-radius: var(--radius-sm); border: 2px solid rgba(184,124,94,0.20); font-family: var(--font-sans); font-size: 0.95rem; resize: vertical; min-height: 80px; transition: var(--transition); background: var(--cream); }
    .comment-form textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184,124,94,0.10); }
    .comment-form .form-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    /* COMMUNITY */
    .community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin: 30px 0 40px; }
    .community-card { background: var(--warm-white); border-radius: var(--radius); padding: 24px 26px; box-shadow: var(--shadow); border: 1px solid rgba(184,124,94,0.06); transition: var(--transition); }
    .community-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .community-card .community-author { font-weight: 600; color: var(--dark); }
    .community-card .community-date { font-size: 0.8rem; color: var(--text-light); }
    .community-card .community-content { margin-top: 10px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .community-card .community-tag { display: inline-block; font-size: 0.7rem; background: var(--secondary); padding: 2px 14px; border-radius: 50px; color: var(--dark); margin-top: 10px; }
    /* AUTH */
    .auth-container { max-width: 460px; margin: 40px auto 60px; background: var(--warm-white); padding: 40px 44px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(184,124,94,0.06); }
    .auth-container h2 { font-family: var(--font-serif); font-size: 2rem; text-align: center; margin-bottom: 6px; }
    .auth-container .auth-sub { text-align: center; color: var(--text-light); margin-bottom: 28px; }
    .auth-container label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 0.9rem; }
    .auth-container input, .auth-container select, .auth-container textarea { width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 2px solid rgba(184,124,94,0.15); font-family: var(--font-sans); font-size: 0.95rem; transition: var(--transition); background: var(--cream); margin-bottom: 16px; }
    .auth-container input:focus, .auth-container select:focus, .auth-container textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184,124,94,0.08); }
    .auth-container .btn { width: 100%; padding: 14px; font-size: 1rem; }
    .auth-container .auth-link { text-align: center; margin-top: 16px; color: var(--text-light); }
    .auth-container .auth-link a { color: var(--primary); font-weight: 600; }
    .auth-container .auth-link a:hover { text-decoration: underline; }
    /* ADMIN */
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin: 30px 0 20px; padding-bottom: 16px; border-bottom: 2px solid rgba(184,124,94,0.12); }
    .admin-header h2 { font-family: var(--font-serif); font-size: 2rem; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: var(--warm-white); padding: 18px 22px; border-radius: var(--radius-sm); box-shadow: var(--shadow); text-align: center; border: 1px solid rgba(184,124,94,0.06); }
    .stat-card .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .stat-label { font-size: 0.85rem; color: var(--text-light); }
    .admin-table-wrap { overflow-x: auto; background: var(--warm-white); border-radius: var(--radius); padding: 16px 20px 24px; box-shadow: var(--shadow); border: 1px solid rgba(184,124,94,0.06); margin-bottom: 30px; }
    .admin-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .admin-table-wrap th { text-align: left; padding: 12px 8px; border-bottom: 2px solid rgba(184,124,94,0.12); color: var(--dark); font-weight: 600; }
    .admin-table-wrap td { padding: 12px 8px; border-bottom: 1px solid rgba(184,124,94,0.06); vertical-align: middle; }
    .admin-table-wrap .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .admin-table-wrap .actions .btn { padding: 4px 14px; font-size: 0.75rem; }
    .post-form { background: var(--warm-white); padding: 30px 36px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(184,124,94,0.06); margin-bottom: 40px; }
    .post-form label { font-weight: 500; display: block; margin-bottom: 4px; font-size: 0.9rem; }
    .post-form input, .post-form select, .post-form textarea { width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 2px solid rgba(184,124,94,0.15); font-family: var(--font-sans); font-size: 0.95rem; transition: var(--transition); background: var(--cream); margin-bottom: 16px; }
    .post-form input:focus, .post-form select:focus, .post-form textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184,124,94,0.08); }
    .post-form textarea { min-height: 160px; resize: vertical; }
    .post-form .form-row-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    /* TOAST */
    .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 14px 24px; border-radius: var(--radius-sm); background: var(--dark); color: #fff; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.20); animation: slideUp 0.4s ease; max-width: 360px; }
    .toast.success { background: #2d7d46; }
    .toast.error { background: #c0392b; }
    .toast.info { background: var(--primary); }
    @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
    /* FOOTER */
    footer { background: var(--dark); color: rgba(255,255,255,0.8); padding: 40px 0 28px; margin-top: 50px; }
    footer .footer-inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 24px; }
    footer .footer-brand { font-family: var(--font-serif); font-size: 1.4rem; color: #fff; }
    footer .footer-brand span { color: var(--gold); }
    footer .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    footer .footer-links a { color: rgba(255,255,255,0.7); transition: var(--transition); }
    footer .footer-links a:hover { color: #fff; }
    footer .footer-copy { text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 0.85rem; color: rgba(255,255,255,0.4); }
    /* RESPONSIVE */
    @media (max-width: 768px) { .header-inner { flex-direction: column; align-items: stretch; gap: 10px; } .nav-links { justify-content: center; } .nav-auth { justify-content: center; } .hero h1 { font-size: 2.4rem; } .post-detail { padding: 24px 18px; } .post-detail h1 { font-size: 1.8rem; } .auth-container { padding: 28px 20px; margin: 20px 12px; } .admin-header { flex-direction: column; align-items: flex-start; } .blog-grid { grid-template-columns: 1fr; } .community-grid { grid-template-columns: 1fr; } .post-form { padding: 20px 16px; } .comments-section { padding: 20px 16px; } .admin-table-wrap { padding: 12px 8px; } .admin-table-wrap table { font-size: 0.8rem; } .admin-table-wrap .actions .btn { padding: 2px 10px; font-size: 0.65rem; } }
    @media (max-width: 480px) { .hero h1 { font-size: 1.8rem; } .section-title { font-size: 1.6rem; } .container { padding: 0 14px; } .nav-links a, .nav-links .nav-link { padding: 4px 12px; font-size: 0.8rem; } .nav-auth .btn { padding: 4px 14px; font-size: 0.75rem; } }
    /* UTILITY */
    .hidden { display: none !important; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
    .empty-state i { font-size: 3rem; color: var(--secondary); margin-bottom: 12px; }
    .empty-state h4 { font-size: 1.2rem; color: var(--dark); margin-bottom: 4px; }
  </style>
</head>
<body>

<script>
  // ================================================================
  //  SUPABASE CONFIGURATION  (REPLACE WITH YOUR OWN)
  // ================================================================
const SUPABASE_URL = 'https://ftwblniakzjtfpsmyklx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0d2Jsbmlha3pqdGZwc215a2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MTcwNTIsImV4cCI6MjA5OTM5MzA1Mn0.muScYbd321599Ei4YidwFvZ4z0frBcH9G_ePn814RFU';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ================================================================
  //  HELPERS
  // ================================================================
  function toast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    container.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(40px)';
      setTimeout(() => el.remove(), 400);
    }, 3500);
  }

  function formatDate(iso) {
    if (!iso) return 'Just now';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function timeAgo(iso) {
    if (!iso) return 'Just now';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days < 7) return days + 'd ago';
    return formatDate(iso);
  }

  function slugify(text) {
    return text.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  }

  function getCategoryLabel(cat) {
    const map = { 'self-love': 'Self-Love', 'self-growth': 'Self-Growth', 'spirituality': 'Spirituality', 'journaling': 'Journaling' };
    return map[cat] || cat;
  }

  function getCategoryColor(cat) {
    const map = { 'self-love': '#b87c5e', 'self-growth': '#8fa88a', 'spirituality': '#b8a0c0', 'journaling': '#c9a87c' };
    return map[cat] || '#b87c5e';
  }

  function truncate(text, len = 120) {
    if (text.length <= len) return text;
    return text.substr(0, len) + '…';
  }

  // ================================================================
  //  AUTH STATE
  // ================================================================
  let currentUser = null;
  let currentSession = null;

  async function initAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentSession = session;
    if (session) {
      currentUser = session.user;
      // Fetch profile role
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();
      if (profile) currentUser.role = profile.role;
    }
    renderNav();
  }

  async function loginUser(email, password) {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      toast(error.message, 'error');
      return false;
    }
    currentUser = data.user;
    currentSession = data.session;
    // Fetch role
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', data.user.id)
      .single();
    if (profile) currentUser.role = profile.role;
    toast('Welcome back!', 'success');
    renderNav();
    navigate('home');
    return true;
  }

  async function registerUser(email, password, username) {
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { username } }
    });
    if (error) {
      toast(error.message, 'error');
      return false;
    }
    // The trigger will create the profile
    toast('Account created! Please sign in.', 'success');
    // Auto-login after signup? We'll let user sign in.
    navigate('login');
    return true;
  }

  async function logoutUser() {
    await supabaseClient.auth.signOut();
    currentUser = null;
    currentSession = null;
    toast('Logged out.', 'info');
    renderNav();
    navigate('home');
  }

  function isLoggedIn() { return !!currentUser; }
  function isAdmin() { return currentUser && currentUser.role === 'admin'; }

  // ================================================================
  //  DATA OPERATIONS (Supabase)
  // ================================================================

  // Posts
  async function getPosts() {
    const { data, error } = await supabaseClient
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error(error); return []; }
    return data;
  }

  async function getPostById(id) {
    const { data, error } = await supabaseClient
      .from('posts')
      .select('*, comments(*, profiles(username))') // nested comments
      .eq('id', id)
      .single();
    if (error) { console.error(error); return null; }
    return data;
  }

  async function createPost(title, category, excerpt, content) {
    if (!isAdmin()) { toast('Only admin can create posts.', 'error'); return false; }
    const { data, error } = await supabaseClient
      .from('posts')
      .insert([{
        title,
        category,
        excerpt: excerpt || truncate(content, 130),
        content,
        author_id: currentUser.id,
        author_name: currentUser.email.split('@')[0] // fallback
      }])
      .select();
    if (error) { toast(error.message, 'error'); return false; }
    toast('Post published!', 'success');
    return true;
  }

  async function updatePost(id, { title, category, excerpt, content }) {
    if (!isAdmin()) { toast('Only admin can update posts.', 'error'); return false; }
    const { error } = await supabaseClient
      .from('posts')
      .update({ title, category, excerpt: excerpt || truncate(content, 130), content, updated_at: new Date() })
      .eq('id', id);
    if (error) { toast(error.message, 'error'); return false; }
    toast('Post updated!', 'success');
    return true;
  }

  async function deletePost(id) {
    if (!isAdmin()) { toast('Only admin can delete posts.', 'error'); return false; }
    const { error } = await supabaseClient
      .from('posts')
      .delete()
      .eq('id', id);
    if (error) { toast(error.message, 'error'); return false; }
    toast('Post deleted.', 'info');
    return true;
  }

  // Comments
  async function addComment(postId, text) {
    if (!isLoggedIn()) { toast('Please log in to comment.', 'error'); return false; }
    const { error } = await supabaseClient
      .from('comments')
      .insert([{
        post_id: postId,
        author_id: currentUser.id,
        author_name: currentUser.email.split('@')[0],
        text
      }]);
    if (error) { toast(error.message, 'error'); return false; }
    toast('Comment added!', 'success');
    return true;
  }

  // Community
  async function getCommunityPosts() {
    const { data, error } = await supabaseClient
      .from('community_posts')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error(error); return []; }
    return data;
  }

  async function addCommunityPost(content, tag) {
    if (!isLoggedIn()) { toast('Please log in to share.', 'error'); return false; }
    const { error } = await supabaseClient
      .from('community_posts')
      .insert([{
        author_id: currentUser.id,
        author_name: currentUser.email.split('@')[0],
        content,
        tag: tag || 'reflection'
      }]);
    if (error) { toast(error.message, 'error'); return false; }
    toast('Thank you for sharing!', 'success');
    return true;
  }

  // Users (for admin)
  async function getUsers() {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('*');
    if (error) { console.error(error); return []; }
    return data;
  }

  async function deleteUser(userId) {
    if (!isAdmin()) { toast('Admin access required.', 'error'); return false; }
    // Delete from auth (requires admin privileges) – Supabase allows via REST if using service role key, but we'll keep it simple: delete from profiles only.
    // For a full solution, you'd call a Supabase Edge Function with service role.
    // We'll just remove from profiles (cascade delete is on).
    const { error } = await supabaseClient
      .from('profiles')
      .delete()
      .eq('id', userId);
    if (error) { toast(error.message, 'error'); return false; }
    toast('User removed.', 'info');
    return true;
  }

  // ================================================================
  //  NAVIGATION & RENDERING (similar to original, but with async data)
  // ================================================================
  let currentPage = 'home';
  let currentPostId = null;
  let currentCategory = 'all';
  let editingPostId = null;
  let allPosts = [];

  async function navigate(page, data) {
    currentPage = page;
    if (page === 'post' && data) currentPostId = data;
    if (page === 'blog') currentCategory = data || 'all';
    if (page === 'admin' && !isAdmin()) {
      toast('Admin access required.', 'error');
      return navigate('home');
    }
    await renderPage();
    renderNav();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderNav() {
    // same as before
    const links = document.querySelectorAll('[data-nav]');
    links.forEach(el => {
      const nav = el.getAttribute('data-nav');
      if (nav === currentPage || (currentPage === 'post' && nav === 'blog')) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });
    const adminLinks = document.querySelectorAll('#adminNavLink, #footerAdminLink');
    adminLinks.forEach(el => {
      if (isAdmin()) el.classList.remove('hidden');
      else el.classList.add('hidden');
    });
    const user = currentUser;
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const greeting = document.getElementById('userGreeting');
    if (user) {
      loginBtn.classList.add('hidden');
      registerBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
      greeting.classList.remove('hidden');
      greeting.textContent = '👋 ' + (user.email.split('@')[0]);
    } else {
      loginBtn.classList.remove('hidden');
      registerBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
      greeting.classList.add('hidden');
    }
  }

  async function renderPage() {
    const container = document.getElementById('pageContent');
    switch (currentPage) {
      case 'home': container.innerHTML = await renderHome(); break;
      case 'blog': container.innerHTML = await renderBlog(currentCategory); break;
      case 'post': container.innerHTML = await renderPostDetail(currentPostId); break;
      case 'community': container.innerHTML = await renderCommunity(); break;
      case 'admin': container.innerHTML = await renderAdmin(); break;
      case 'login': container.innerHTML = renderAuth('login'); break;
      case 'register': container.innerHTML = renderAuth('register'); break;
      default: container.innerHTML = '<div class="container"><h2>Page not found</h2></div>';
    }
    bindEvents();
  }

  // ================================================================
  //  EVENT BINDING (with async handlers)

  function bindEvents() {
    // Navigation
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.onclick = (e) => {
        e.preventDefault();
        const page = el.getAttribute('data-nav');
        if (page === 'admin' && !isAdmin()) { toast('Admin access required.', 'error'); return; }
        if ((page === 'login' || page === 'register') && isLoggedIn()) { toast('You are already logged in.', 'info'); return; }
        navigate(page);
      };
    });

    // Category filter
    document.querySelectorAll('[data-cat]').forEach(el => {
      el.onclick = () => { const cat = el.getAttribute('data-cat'); navigate('blog', cat); };
    });
    document.querySelectorAll('[data-nav-cat]').forEach(el => {
      el.onclick = () => { const cat = el.getAttribute('data-nav-cat'); navigate('blog', cat === 'all' ? 'all' : cat); };
    });

    // View post
    document.querySelectorAll('[data-view-post]').forEach(el => {
      el.onclick = () => { const id = el.getAttribute('data-view-post'); navigate('post', id); };
    });

    // Edit post (admin)
    document.querySelectorAll('[data-edit-post]').forEach(el => {
      el.onclick = () => {
        if (!isAdmin()) { toast('Admin access required.', 'error'); return; }
        const id = el.getAttribute('data-edit-post');
        editingPostId = id;
        navigate('admin');
      };
    });

    // Delete post
    document.querySelectorAll('[data-delete-post]').forEach(el => {
      el.onclick = async () => {
        if (!isAdmin()) { toast('Admin access required.', 'error'); return; }
        const id = el.getAttribute('data-delete-post');
        if (confirm('Delete this post permanently?')) {
          await deletePost(id);
          if (currentPage === 'post' && currentPostId === id) navigate('blog');
          else renderPage();
        }
      };
    });

    // Delete user (admin)
    document.querySelectorAll('[data-delete-user]').forEach(el => {
      el.onclick = async () => {
        if (!isAdmin()) { toast('Admin access required.', 'error'); return; }
        const id = el.getAttribute('data-delete-user');
        if (confirm('Remove this user?')) {
          await deleteUser(id);
          renderPage();
        }
      };
    });

    // Submit comment
    const commentBtn = document.getElementById('submitCommentBtn');
    if (commentBtn) {
      commentBtn.onclick = async () => {
        const postId = commentBtn.getAttribute('data-post-id');
        const input = document.getElementById('commentInput');
        if (!input || !input.value.trim()) { toast('Please write a reflection.', 'error'); return; }
        const success = await addComment(postId, input.value.trim());
        if (success) {
          input.value = '';
          navigate('post', postId);
        }
      };
    }

    // Submit community post
    const communityBtn = document.getElementById('submitCommunityBtn');
    if (communityBtn) {
      communityBtn.onclick = async () => {
        const input = document.getElementById('communityInput');
        const tag = document.getElementById('communityTag');
        if (!input || !input.value.trim()) { toast('Please share something from your heart.', 'error'); return; }
        const success = await addCommunityPost(input.value.trim(), tag ? tag.value : 'reflection');
        if (success) {
          input.value = '';
          navigate('community');
        }
      };
    }

    // Admin: New Post
    const newBtn = document.getElementById('adminNewPostBtn');
    if (newBtn) {
      newBtn.onclick = () => {
        editingPostId = null;
        const form = document.getElementById('adminPostForm');
        if (form) {
          form.style.display = 'block';
          document.getElementById('postFormTitle').value = '';
          document.getElementById('postFormCategory').value = 'self-love';
          document.getElementById('postFormExcerpt').value = '';
          document.getElementById('postFormContent').value = '';
          document.getElementById('postFormSubmitBtn').textContent = 'Publish Post';
          const cancelBtn = document.getElementById('adminCancelEditBtn');
          if (cancelBtn) cancelBtn.style.display = 'inline-block';
        }
      };
    }

    // Admin: Cancel Edit
    const cancelEditBtn = document.getElementById('adminCancelEditBtn');
    if (cancelEditBtn) {
      cancelEditBtn.onclick = () => {
        editingPostId = null;
        const form = document.getElementById('adminPostForm');
        if (form) form.style.display = 'none';
        cancelEditBtn.style.display = 'none';
      };
    }

    // Admin: Post Form Submit
    const submitBtn = document.getElementById('postFormSubmitBtn');
    if (submitBtn) {
      submitBtn.onclick = async () => {
        const title = document.getElementById('postFormTitle').value.trim();
        const category = document.getElementById('postFormCategory').value;
        const excerpt = document.getElementById('postFormExcerpt').value.trim();
        const content = document.getElementById('postFormContent').value.trim();
        if (!title || !content) { toast('Title and content are required.', 'error'); return; }
        let success;
        if (editingPostId) {
          success = await updatePost(editingPostId, { title, category, excerpt, content });
        } else {
          success = await createPost(title, category, excerpt, content);
        }
        if (success) {
          editingPostId = null;
          const form = document.getElementById('adminPostForm');
          if (form) form.style.display = 'none';
          const cancelEditBtn = document.getElementById('adminCancelEditBtn');
          if (cancelEditBtn) cancelEditBtn.style.display = 'none';
          navigate('admin');
        }
      };
    }

    // Admin: Post Form Cancel
    const cancelBtn = document.getElementById('postFormCancelBtn');
    if (cancelBtn) {
      cancelBtn.onclick = () => {
        const form = document.getElementById('adminPostForm');
        if (form) form.style.display = 'none';
        editingPostId = null;
        const cancelEditBtn = document.getElementById('adminCancelEditBtn');
        if (cancelEditBtn) cancelEditBtn.style.display = 'none';
      };
    }

    // Auth Form
    const authForm = document.getElementById('authForm');
    if (authForm) {
      authForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        const isLogin = currentPage === 'login';
        if (!email || !password) { toast('Please fill in all fields.', 'error'); return; }
        if (isLogin) {
          await loginUser(email, password);
        } else {
          const username = document.getElementById('authUsername').value.trim();
          if (!username) { toast('Please choose a username.', 'error'); return; }
          await registerUser(email, password, username);
        }
      };
    }

    // Header auth buttons
    document.getElementById('loginBtn').onclick = () => { if (!isLoggedIn()) navigate('login'); };
    document.getElementById('registerBtn').onclick = () => { if (!isLoggedIn()) navigate('register'); };
    document.getElementById('logoutBtn').onclick = logoutUser;

    // Enter key for comment and community inputs
    const commentInput = document.getElementById('commentInput');
    if (commentInput) {
      commentInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const btn = document.getElementById('submitCommentBtn');
          if (btn) btn.click();
        }
      });
    }
    const communityInput = document.getElementById('communityInput');
    if (communityInput) {
      communityInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const btn = document.getElementById('submitCommunityBtn');
          if (btn) btn.click();
        }
      });
    }
  }

  // ================================================================
  //  INIT
  // ================================================================
  async function init() {
    await initAuth();
    await navigate('home');
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
